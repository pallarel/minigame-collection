<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARDLE</title>
    <style>
        :root {
            /* 暗色主题 */
            --bg-color: #121213;
            --text-color: #ffffff;
            --tile-border: #3a3a3c;
            --tile-fill: #565758;
            --tile-selected: #ffffff;
            --tile-selected-shadow: rgba(255, 255, 255, 0.5);
            --tile-locked-bg: #878787;
            --correct-color: #6aaa64;
            --present-color: #c9b458;
            --absent-color: #555555;
            --key-bg: #818384;
            --key-hover: #9e9e9e;
            --btn-bg: #818384;
            --btn-hover: #9e9e9e;
            --icon-btn-hover: rgba(255, 255, 255, 0.1);
            --clear-btn-bg: transparent;
            --clear-btn-hover: rgba(255, 255, 255, 0.1);
            --floating-bg: rgba(32, 32, 32, 0.9);
            --floating-text: #ffffff;
            --floating-success-bg: rgba(106, 170, 100, 0.85);
            --floating-error-bg: rgba(255, 107, 107, 0.85);
            --panel-bg: rgba(255, 255, 255, 0.035);
            --panel-border: rgba(255, 255, 255, 0.09);
            --panel-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
        }

        body.light {
            /* 亮色主题覆盖变量 */
            --bg-color: #f4f4f4;
            --text-color: #121213;
            --tile-border: #cccccc;
            --tile-fill: #e0e0e0;
            --tile-selected: #333333;
            --tile-selected-shadow: rgba(46, 46, 46, 0.5);
            --tile-locked-bg: #3d3d3d;
            --correct-color: #66bb6a;
            --present-color: #f4c20d;
            --absent-color: #898989;
            --key-bg: #cccccc;
            --key-hover: #aaaaaa;
            --btn-bg: #cccccc;
            --btn-hover: #aaaaaa;
            --icon-btn-hover: rgba(0, 0, 0, 0.1);
            --clear-btn-bg: #f4f4f4;
            --clear-btn-hover: #d3d3d3;
            --floating-bg: rgba(40, 40, 40, 0.92);
            --floating-text: #ffffff;
            --floating-success-bg: rgba(106, 170, 100, 0.9);
            --floating-error-bg: rgba(255, 107, 107, 0.9);
            --panel-bg: #ffffff;
            --panel-border: rgba(0, 0, 0, 0.08);
            --panel-shadow: 0 18px 50px rgba(0, 0, 0, 0.09);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .header-title {
            font-family: 'Consolas';
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-align: center;
            margin: 0;
        }


        /* 主题切换按钮位置 */
        .icon-btn {
            background: none;
            color: var(--text-color);
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        .icon-btn:hover {
            background-color: var(--icon-btn-hover);
        }

        .theme-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-color);
        }

        .game-board {
            display: grid;
            grid-template-rows: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .game-layout,
        .play-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* .row {
            display: grid;
            grid-template-columns: 40px repeat(5, 46px) auto;
            gap: 5px;
            align-items: center;
        } */

        .row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            gap: 10px;
        }

        .side-left,
        .side-right {
            width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .row-left {
            display: flex;
            justify-content: right;
            align-items: center;
        }

        .tile-container {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .score-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            min-width: 64px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .score-display.visible {
            opacity: 1;
        }

        .clear-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 4px;
            background-color: var(--clear-btn-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s, background-color 0.3s;
        }
        .clear-btn:hover {
            background-color: var(--clear-btn-hover);
        }
        .clear-btn.visible {
            opacity: 1;
        }

        .tile {
            width: 46px;
            height: 46px;
            border: 2px solid var(--tile-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: border-color 0.1s, background-color 0.1s;
            background-color: transparent;
        }

        .tile.filled {
            border-color: var(--tile-fill);
        }

        .tile.selected {
            border-color: var(--tile-selected);
            box-shadow: 0 0 8px var(--tile-selected-shadow); /*rgba(255, 255, 255, 0.5);*/
        }

        .tile.correct {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
            color: #fff;
        }

        .tile.present {
            background-color: var(--present-color);
            border-color: var(--present-color);
            color: #fff;
        }

        .tile.absent {
            background-color: var(--absent-color);
            border-color: var(--absent-color);
            color: #fff;
        }

        /* .tile.locked {
            outline: 3px solid var(--tile-locked-outline);
            outline-offset: -3px;
        } */
        
        .tile.locked {
            position: relative;
        }
        .tile.locked::after {
            content: "";
            position: absolute;
            top: 1px;
            right: 1px;
            width: 13px;
            height: 13px;
            background-color:  var(--tile-locked-bg);
            border-radius: 1px;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M12 2C9.243 2 7 4.243 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-2.757-2.243-5-5-5M9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9zm4 10.723V20h-2v-2.277a1.993 1.993 0 0 1 .567-3.677A2 2 0 0 1 14 16a1.99 1.99 0 0 1-1 1.723'/></svg>") center / contain no-repeat;
            -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M12 2C9.243 2 7 4.243 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-2.757-2.243-5-5-5M9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9zm4 10.723V20h-2v-2.277a1.993 1.993 0 0 1 .567-3.677A2 2 0 0 1 14 16a1.99 1.99 0 0 1-1 1.723'/></svg>") center / contain no-repeat;
        }

        .score-box {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            position: relative;
            color: #fff;
        }

        .score-correct {
            background-color: var(--correct-color);
        }

        .score-present {
            background-color: var(--present-color);
        }

        .score-label {
            font-size: 10px;
            position: absolute;
            bottom: -12px;
            color: #888;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 500px;
        }

        .keyboard-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .key {
            min-width: 43px;
            height: 58px;
            border: none;
            border-radius: 4px;
            background-color: var(--key-bg);
            color: var(--text-color);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            transition: background-color 0.1s;
        }
        .key:hover {
            background-color: var(--key-hover);
        }
        .key.wide {
            min-width: 65px;
        }
        .key.correct {
            background-color: var(--correct-color);
            color: white;
        }
        .key.present {
            background-color: var(--present-color);
            color: white;
        }
        .key.absent {
            background-color: var(--absent-color);
            color: white;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .surrender-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .surrender-btn svg {
            flex: 0 0 auto;
            fill: #fff;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }
        .btn:hover {
            background-color: var(--btn-hover);
        }

        .floating-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--floating-bg);
            color: var(--floating-text);
            padding: 16px 24px;
            font-size: 20px;
            border-radius: 12px;
            z-index: 1000;
            opacity: 0;
            animation: floatInOut 2s ease forwards;
        }
        .floating-message.success {
            background-color: var(--floating-success-bg);
            color: #fff;
        }
        .floating-message.error {
            background-color: var(--floating-error-bg);
            color: #fff;
        }

        @keyframes floatInOut {
            0% { opacity: 0; transform: translate(-50%, -60%); }
            10% { opacity: 1; transform: translate(-50%, -50%); }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -40%); }
        }


        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #818384;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        .btn:hover {
            background-color: #9e9e9e;
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
            min-height: 24px;
        }

        #solution:empty,
        .message:empty {
            display: none;
        }

        .stats-dialog {
            width: min(440px, calc(100vw - 32px));
            max-height: calc(100dvh - 32px);
            overflow-y: auto;
            border: 1px solid var(--tile-border);
            border-radius: 14px;
            padding: 0;
            color: var(--text-color);
            background: var(--bg-color);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        }
        .stats-dialog::backdrop { background: rgba(0, 0, 0, 0.62); }
        .stats-content { padding: 22px; }
        .stats-header { display: flex; align-items: center; justify-content: space-between; }
        .stats-header h2, .stats-history h3, .stats-distribution h3 { margin: 0; }
        .stats-close { font-size: 25px; line-height: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 22px 0; }
        .stat { text-align: center; }
        .stat-value { display: block; font-size: 28px; font-weight: bold; }
        .stat-label { display: block; color: #888; font-size: 12px; margin-top: 4px; }
        .stats-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; border-radius: 8px; background: var(--icon-btn-hover); }
        .stats-tab { padding: 8px 10px; border: 0; border-radius: 6px; background: transparent; color: var(--text-color); cursor: pointer; font-weight: bold; }
        .stats-tab.active { background: var(--btn-bg); color: #fff; }
        .stats-tab-panel { padding-top: 18px; }
        .stats-tab-panel[hidden] { display: none; }
        .stats-distribution { padding-bottom: 4px; }
        .distribution-chart { display: grid; gap: 7px; margin-top: 14px; }
        .distribution-row { display: grid; grid-template-columns: 44px 1fr 28px; align-items: center; gap: 8px; font-size: 12px; }
        .distribution-label { color: #888; text-align: right; }
        .distribution-track { height: 16px; overflow: hidden; border-radius: 3px; background: var(--icon-btn-hover); }
        .distribution-bar { height: 100%; min-width: 0; border-radius: 3px; background: var(--correct-color); }
        .distribution-row.loss .distribution-bar { background: var(--floating-error-bg); }
        .distribution-count { font-weight: bold; text-align: right; }
        .stats-history { padding-bottom: 1px; }
        .history-list { list-style: none; padding: 0; margin: 12px 0 18px; max-height: 320px; overflow-y: auto; }
        .history-list > li { padding: 8px 0; border-bottom: 1px solid var(--tile-border); }
        .history-entry summary { display: flex; justify-content: space-between; gap: 12px; cursor: pointer; list-style: none; }
        .history-entry summary::-webkit-details-marker { display: none; }
        .history-entry summary::before { content: '›'; flex: 0 0 auto; transition: transform 0.15s; }
        .history-entry[open] summary::before { transform: rotate(90deg); }
        .history-summary-main { flex: 1; }
        .history-summary-meta { color: #888; white-space: nowrap; }
        .history-details { margin: 10px 0 2px 18px; padding: 10px; border-radius: 8px; background: var(--icon-btn-hover); }
        .history-marker-note { margin: 0 0 10px; color: #888; font-size: 11px; line-height: 1.45; }
        .history-guess { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
        .history-guess:last-of-type { margin-bottom: 10px; }
        .history-tile { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 25px; height: 25px; border: 1px solid var(--tile-border); border-radius: 3px; font-size: 12px; font-weight: bold; }
        .history-tile.correct { background: var(--correct-color); border-color: var(--correct-color); color: #fff; }
        .history-tile.present { background: var(--present-color); border-color: var(--present-color); color: #fff; }
        .history-tile.absent { background: var(--absent-color); border-color: var(--absent-color); color: #fff; }
        .history-tile.locked { box-shadow: inset 0 0 0 2px var(--tile-locked-bg); }
        .history-score { display: flex; gap: 4px; margin-left: auto; }
        .history-score-box { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .history-score-box.correct { background: var(--correct-color); }
        .history-score-box.present { background: var(--present-color); }
        .history-detail-cleared { margin: 0; color: #888; }
        .history-detail-clear { padding: 6px 9px; border: 0; border-radius: 4px; background: var(--btn-bg); color: var(--text-color); cursor: pointer; font-size: 12px; }
        .history-empty { color: #888; text-align: center; }
        .danger-btn {
            width: 100%;
            margin-top: 18px;
            margin-bottom: 4px;
            background: #b00020;
            color: #fff;
        }
        .help-list { margin: 20px 0 4px; padding-left: 22px; line-height: 1.55; }
        .help-list li { margin-bottom: 10px; }
        .help-note { margin: 16px 0 0; padding: 12px; border-radius: 8px; background: var(--icon-btn-hover); line-height: 1.45; }

        @media (max-width: 560px) {
            body { padding: 12px 4px; }
            .header { margin-bottom: 12px; }
            .side-left, .side-right { width: 72px; }
            .header .icon-btn { padding: 4px; }
            .row { gap: 4px; }
            .tile { width: min(42px, 14.5vw); height: min(42px, 14.5vw); }
            .score-box { width: 27px; height: 27px; font-size: 14px; }
            .score-label { font-size: 8px; }
            .key { min-width: 8.6vw; height: 52px; padding: 0; }
            .key.wide { min-width: 12vw; }
            .keyboard-row { gap: 4px; }
            .controls { gap: 6px; }
            .btn { padding: 10px 12px; }
        }

        @media (max-height: 900px) {
            body { padding-top: 8px; padding-bottom: 8px; }
            .header { margin-bottom: 8px; }
            .header-title { font-size: 28px; }
            .game-board { gap: 2px; margin-bottom: 8px; }
            .tile { width: 36px; height: 36px; font-size: 20px; }
            .keyboard { gap: 4px; }
            .keyboard-row { gap: 4px; }
            .key { height: 42px; }
            .controls { margin-top: 8px; }
            .btn { padding-top: 8px; padding-bottom: 8px; }
            #solution { margin-top: 6px !important; }
            .message { margin-top: 6px; min-height: 0; }
        }

        @media (max-height: 700px) {
            body { padding-top: 4px; padding-bottom: 4px; }
            .header { margin-bottom: 4px; }
            .header-title { font-size: 25px; }
            .game-board { gap: 1px; margin-bottom: 5px; }
            .tile { width: 32px; height: 32px; font-size: 18px; }
            .key { height: 36px; }
            .controls { margin-top: 5px; }
            .btn { padding-top: 6px; padding-bottom: 6px; }
        }

        @media (min-width: 1100px) {
            body { padding: 16px 20px; }
            .header { max-width: 984px; margin-bottom: 12px; }
            .header-title { font-size: 32px; }
            .game-layout {
                display: grid;
                grid-template-columns: 400px 484px;
                align-items: center;
                gap: 28px;
                padding: 24px 44px 24px 28px;
                border: 1px solid var(--panel-border);
                border-radius: 20px;
                background: var(--panel-bg);
                box-shadow: var(--panel-shadow);
            }
            .game-board { gap: 4px; margin-bottom: 0; }
            .tile { width: 44px; height: 44px; font-size: 23px; }
            .keyboard { gap: 8px; }
            .keyboard-row { gap: 6px; }
            .key { height: 56px; }
            .controls { margin-top: 18px; }
            .btn { padding-top: 10px; padding-bottom: 10px; }
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #6aaa64;
        }
    </style>
</head>
<body class="light">
    <div class="header">
        <div class="side-left">
            <button class="icon-btn" onclick="showHistory()" aria-label="History">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2m0 16H5V5h14zM9 17H7V7h2zm4 0h-2v-7h2zm4 0h-2v-5h2z"/>
                </svg>
            </button>
            <button class="icon-btn" onclick="showHelp()" aria-label="How to Play" title="How to Play">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0-18 0m9 5v.01"/>
                        <path d="M12 13.5a1.5 1.5 0 0 1 1-1.5a2.6 2.6 0 1 0-3-4"/>
                    </g>
                </svg>
            </button>
        </div>

        <h1 class="header-title">HARDLE</h1>

        <div class="side-right">
            <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
                <svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
                    <path fill="currentColor" d="M10 3.5a6.5 6.5 0 1 1 0 13zM10 2a8 8 0 1 0 0 16a8 8 0 0 0 0-16"/>
                </svg>
            </button>
        </div>
    </div>

    <main class="game-layout">
        <div class="game-board" id="gameBoard"></div>

        <section class="play-panel" aria-label="Game controls">
        <div class="keyboard" id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key wide" data-key="Enter">✓</button>
            <button class="key" data-key="Z">Z</button>

        const STATS_KEY = 'hardle.stats.v2';

        function defaultStats() {
            return {
                played: 0,
                wins: 0,
                currentStreak: 0,
                bestStreak: 0,
                winDistribution: Array(10).fill(0),
                history: []
            };
        }

        function readJson(key, fallback) {
            try {
                const value = JSON.parse(localStorage.getItem(key));
                return value && typeof value === 'object' ? value : fallback;
            } catch (error) {
                console.warn(`Could not read ${key}`, error);
                return fallback;
            }
        }

        function saveGame() {
            if (!targetWord || !gameBoard.length) return;
            const state = {
                version: 1,
                targetWord,
                currentRow,
                currentCol,
                selectedCol,
                gameOver,
                gameBoard,
                lockedTiles: [...lockedTiles],
                manualColors: [...manualColors],
                savedAt: new Date().toISOString()
            };
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            } catch (error) {
                console.warn('Could not save the current game', error);
            }
        }

        function restoreGame() {
            const state = readJson(SAVE_KEY, null);
            if (!state || state.version !== 1 || !/^[A-Z]{5}$/.test(state.targetWord) ||
                !Array.isArray(state.gameBoard) || state.gameBoard.length !== maxGuesses) return false;

            targetWord = state.targetWord;
            currentRow = Number.isInteger(state.currentRow) ? state.currentRow : 0;
            currentCol = Number.isInteger(state.currentCol) ? state.currentCol : 0;
            selectedCol = Number.isInteger(state.selectedCol) ? state.selectedCol : -1;
            gameOver = Boolean(state.gameOver);
            gameBoard = state.gameBoard.map(row => Array.isArray(row) ? row.slice(0, wordLength) : Array(wordLength).fill(''));
            lockedTiles = new Set(Array.isArray(state.lockedTiles) ? state.lockedTiles : []);
            manualColors = new Map(Array.isArray(state.manualColors) ? state.manualColors : []);

            createBoard();
            for (let row = 0; row < maxGuesses; row++) {
                for (let col = 0; col < wordLength; col++) {
                    const tile = document.getElementById(`tile-${row}-${col}`);
                    const tileId = `${row}-${col}`;
                    const letter = gameBoard[row][col];
                    if (letter) {
                        tile.textContent = letter;
                        tile.classList.add('filled');
                    }
                    if (manualColors.has(tileId)) tile.classList.add(manualColors.get(tileId));
                    if (lockedTiles.has(tileId)) tile.classList.add('locked');
                    if (gameOver && row === currentRow && gameBoard[row].join('') === targetWord) {
                        tile.classList.add('correct');
                    }
                }
                const submitted = row < currentRow || (gameOver && row === currentRow);
                if (submitted && gameBoard[row].every(Boolean)) {
                    const result = calculateScore(gameBoard[row].join(''), targetWord);
                    displayScore(row, result.correct, result.present);
                }
                updateClearButton(row);
            }
            if (!gameOver && selectedCol >= 0) {
                document.getElementById(`tile-${currentRow}-${selectedCol}`)?.classList.add('selected');
            }
            if (gameOver && gameBoard[currentRow]?.join('') !== targetWord) {
                document.getElementById('solution').textContent = `Correct word: ${targetWord}`;
            }
            updateKeyboardFromManualColors();
            return true;
        }

        function recordResult(won, surrendered = false) {
            const stats = readJson(STATS_KEY, defaultStats());
            stats.played = (stats.played || 0) + 1;
            stats.wins = (stats.wins || 0) + (won ? 1 : 0);
            stats.currentStreak = won ? (stats.currentStreak || 0) + 1 : 0;
            stats.bestStreak = Math.max(stats.bestStreak || 0, stats.currentStreak);
            if (won) stats.winDistribution[currentRow]++;
            stats.history = Array.isArray(stats.history) ? stats.history : [];
            stats.history.unshift({
                id: typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
                won,
                surrendered,
                word: targetWord,
                guesses: won ? currentRow + 1 : (surrendered ? currentRow : maxGuesses),
                date: new Date().toISOString(),
                details: captureGameDetails(won, surrendered)
            });
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));
        }

        function captureGameDetails(won, surrendered) {
            const rowLimit = won ? currentRow + 1 : (surrendered ? Math.min(currentRow + 1, maxGuesses) : maxGuesses);
            const guesses = [];

            for (let row = 0; row < rowLimit; row++) {
                const letters = gameBoard[row] || [];
                if (!letters.some(Boolean)) continue;
                const complete = letters.length === wordLength && letters.every(Boolean);
                const score = complete ? calculateScore(letters.join(''), targetWord) : null;
                guesses.push({
                    tiles: letters.map((letter, col) => ({
                        letter,
                        color: manualColors.get(`${row}-${col}`) || null,
                        locked: lockedTiles.has(`${row}-${col}`)
                    })),
                    score
                });
            }

            return { guesses };
        }

        function showHistory() {
            const stats = readJson(STATS_KEY, defaultStats());
            document.getElementById('statPlayed').textContent = stats.played || 0;
            document.getElementById('statWinRate').textContent = `${stats.played ? Math.round((stats.wins || 0) / stats.played * 100) : 0}%`;
            document.getElementById('statStreak').textContent = stats.currentStreak || 0;
            document.getElementById('statBest').textContent = stats.bestStreak || 0;
            renderDistribution(stats);

            renderHistoryList(stats);
            setStatsTab('distribution');
            document.getElementById('statsDialog').showModal();
        }

        function setStatsTab(tabName) {
            document.querySelectorAll('[data-stats-tab]').forEach(button => {
                const active = button.dataset.statsTab === tabName;
                button.classList.toggle('active', active);
                button.setAttribute('aria-selected', active);
            });
            document.getElementById('distributionPanel').hidden = tabName !== 'distribution';
            document.getElementById('historyPanel').hidden = tabName !== 'history';
        }

        function renderHistoryList(stats) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            const history = Array.isArray(stats.history) ? stats.history : [];
            if (!history.length) {
                historyList.innerHTML = '<li class="history-empty">暂无已完成的游戏</li>';
                return;
            }

            history.forEach(game => {
                const item = document.createElement('li');
                const entry = document.createElement('details');
                entry.className = 'history-entry';

                const summary = document.createElement('summary');
                const resultLabel = game.won ? '胜利' : (game.surrendered ? '投降' : '失败');
                const date = new Date(game.date).toLocaleDateString();
                const rounds = game.won ? `${game.guesses} 轮猜中` : resultLabel;
                summary.innerHTML = `<span class="history-summary-main">${resultLabel} · <strong>${game.word}</strong></span><span class="history-summary-meta">${rounds} · ${date}</span>`;
                entry.appendChild(summary);

                const body = document.createElement('div');
                body.className = 'history-details';
                const guesses = game.details?.guesses;
                if (Array.isArray(guesses)) {
                    const markerNote = document.createElement('p');
                    markerNote.className = 'history-marker-note';
                    markerNote.textContent = '字母格颜色是玩家当时的手动标记；右侧绿、黄数字方块是系统给出的实际计分。';
                    body.appendChild(markerNote);
                    guesses.forEach(guess => {
                        const guessRow = document.createElement('div');
                        guessRow.className = 'history-guess';
                        guess.tiles.forEach(tileData => {
                            const tile = document.createElement('span');
                            tile.className = `history-tile${tileData.color ? ` ${tileData.color}` : ''}${tileData.locked ? ' locked' : ''}`;
                            tile.textContent = tileData.letter || '';
                            if (tileData.locked) tile.title = '已锁定';
                            guessRow.appendChild(tile);
                        });
                        if (guess.score) {
                            const score = document.createElement('span');
                            score.className = 'history-score';
                            const correctScore = document.createElement('span');
                            correctScore.className = 'history-score-box correct';
                            correctScore.textContent = guess.score.correct;
                            correctScore.title = `绿色 ${guess.score.correct}`;
                            const presentScore = document.createElement('span');
                            presentScore.className = 'history-score-box present';
                            presentScore.textContent = guess.score.present;
                            presentScore.title = `黄色 ${guess.score.present}`;
                            score.append(correctScore, presentScore);
                            guessRow.appendChild(score);
                        }
                        body.appendChild(guessRow);
                    });

                    const clearButton = document.createElement('button');
                    clearButton.className = 'history-detail-clear';
                    clearButton.textContent = '清除猜词详情';
                    clearButton.addEventListener('click', () => clearHistoryDetails(game.id));
                    body.appendChild(clearButton);
                } else {
                    body.innerHTML = '<p class="history-detail-cleared">猜词详情已清除，仅保留战绩。</p>';
                }

                entry.appendChild(body);
                item.appendChild(entry);
                historyList.appendChild(item);
            });
        }

        function clearHistoryDetails(gameId) {
            const stats = readJson(STATS_KEY, defaultStats());
            const game = stats.history.find(item => item.id === gameId);
            if (!game || !game.details) return;
            delete game.details;
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));
            renderHistoryList(stats);
            showMessage('该局猜词详情已清除，战绩仍保留', 'success');
        }

        function renderDistribution(stats) {
            const chart = document.getElementById('distributionChart');
            const losses = Math.max(0, (stats.played || 0) - (stats.wins || 0));
            const values = [...stats.winDistribution, losses];
            const largest = Math.max(1, ...values);
            chart.innerHTML = '';

            values.forEach((count, index) => {
                const isLoss = index === maxGuesses;
                const row = document.createElement('div');
                row.className = `distribution-row${isLoss ? ' loss' : ''}`;
                row.setAttribute('aria-label', isLoss ? `失败 ${count} 次` : `第 ${index + 1} 轮获胜 ${count} 次`);

                const label = document.createElement('span');
                label.className = 'distribution-label';
                label.textContent = isLoss ? '失败' : `${index + 1} 轮`;

                const track = document.createElement('div');
                track.className = 'distribution-track';
                const bar = document.createElement('div');
                bar.className = 'distribution-bar';
                bar.style.width = count ? `${Math.max(3, count / largest * 100)}%` : '0';
                track.appendChild(bar);

                const countLabel = document.createElement('span');
                countLabel.className = 'distribution-count';
                countLabel.textContent = count;

                row.append(label, track, countLabel);
                chart.appendChild(row);
            });
        }

        function showHelp() {
            document.getElementById('helpDialog').showModal();
        }

        function initGame(tryRestore = false) {
            if (tryRestore && restoreGame()) return;
            targetWord = TARGET_WORDS[Math.floor(Math.random() * TARGET_WORDS.length)];
            console.log('Target word:', targetWord); // For testing
            currentRow = 0;
            currentCol = 0;
            selectedCol = -1;
            gameOver = false;
            gameBoard = [];
            lockedTiles.clear();
            manualColors.clear();
            undoStack = [];
            
            for (let i = 0; i < maxGuesses; i++) {
                gameBoard[i] = ['', '', '', '', ''];
            }
            
            createBoard();
            resetKeyboard();

            const solutionBox = document.getElementById('solution');
                solutionBox.textContent = ''; // Clear previous solution
            saveGame();
            //showMessage('');

        function loadWordList(url, callback, fallback) {
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then(text => {
                    const words = text
                        .split('\n')
                        .map(w => w.trim().toUpperCase())
                        .filter(w => w.length === wordLength);
                    callback(words);
                })
                .catch(err => {
                    console.error(`Failed to load word list from ${url}:`, err);
                    callback(fallback);
                    showMessage('Using the built-in word list');
                });
        }

        // 初始化加载词库
        function loadDictionariesAndStart() {
            loadWordList("https://raw.githubusercontent.com/tabatkins/wordle-list/main/words", (words) => {
                WORD_LIST = words;
                loadWordList("https://gist.githubusercontent.com/shmookey/b28e342e1b1756c4700f42f17102c2ff/raw/ed4c33a168027aa1e448c579c8383fe20a3a6225/WORDS", (targets) => {
                    TARGET_WORDS = targets;
                    initGame(true); // 词库准备好后启动游戏或恢复存档
                }, FALLBACK_WORDS);
            }, FALLBACK_WORDS);
        }

        function handleTileClick(row, col) {
            if (row === currentRow && !gameOver) {
                // Handle selection for current row
                if (selectedCol === col) {
                    // Deselect if clicking the same tile
                    deselectTile();
                } else {
                    selectTile(col);
                }
            } else if (row < currentRow) {
                // Handle color cycling for completed rows
                cycleTileColor(row, col);
            }
        }

        function selectTile(col) {
            // Remove previous selection
            if (selectedCol >= 0) {
                const prevTile = document.getElementById(`tile-${currentRow}-${selectedCol}`);
                prevTile.classList.remove('selected');
            }
            
            // Select new tile
            selectedCol = col;
            const tile = document.getElementById(`tile-${currentRow}-${selectedCol}`);
            tile.classList.add('selected');
            saveGame();
        }

        function deselectTile() {
            if (selectedCol >= 0) {
                const tile = document.getElementById(`tile-${currentRow}-${selectedCol}`);
                tile.classList.remove('selected');
            }
            selectedCol = -1;
            // Set to first empty position
            currentCol = findFirstEmpty();
            saveGame();
        }

        function findFirstEmpty() {
            for (let i = 0; i < wordLength; i++) {
                if (!gameBoard[currentRow][i]) {
                    return i;
                }
            }
            return wordLength;
        }

        function cycleTileColor(row, col) {
            if (gameBoard[row][col] === '') return;
            
            const tile = document.getElementById(`tile-${row}-${col}`);
            const tileId = `${row}-${col}`;
            const prevColor = tile.classList.contains('correct') ? 'correct' :
                      tile.classList.contains('present') ? 'present' :
                      tile.classList.contains('absent') ? 'absent' : null;
            
            if (lockedTiles.has(tileId)) {
                return;
            }
            
            // 记录当前行的颜色状态以便撤销
            undoStack.push({
                type: 'tile-color',
                tileId,
                prevColor
            });
            
            // Cycle through colors: none -> absent -> present -> correct -> none
            if (!tile.classList.contains('absent') && !tile.classList.contains('present') && !tile.classList.contains('correct')) {
                tile.classList.add('absent');
                manualColors.set(tileId, 'absent');
            } else if (tile.classList.contains('absent')) {
                tile.classList.remove('absent');
                tile.classList.add('present');
                manualColors.set(tileId, 'present');
            } else if (tile.classList.contains('present')) {
                tile.classList.remove('present');
                tile.classList.add('correct');
                manualColors.set(tileId, 'correct');
            } else if (tile.classList.contains('correct')) {
                tile.classList.remove('correct');
                manualColors.delete(tileId);
            }

            
            updateKeyboardFromManualColors();
            updateClearButton(row);
            saveGame();
        }

        function toggleTileLock(row, col) {
            if (gameBoard[row][col] === '') return;
            
            const tile = document.getElementById(`tile-${row}-${col}`);
            const tileId = `${row}-${col}`;
            const wasLocked = lockedTiles.has(tileId);

            // Push undo state
            undoStack.push({
                type: 'lock-toggle',
                tileId: tileId,
                prevLocked: wasLocked
            });

            if (wasLocked) {
                lockedTiles.delete(tileId);
                tile.classList.remove('locked');
            } else {
                lockedTiles.add(tileId);
                tile.classList.add('locked');
            }
            saveGame();
        }

        function clearRowColors(row) {
            if (gameBoard[row].join('') === '') return;
            
            // 记录当前行的颜色状态以便撤销
            const prevStates = [];
            for (let col = 0; col < wordLength; col++) {
                const tileId = `${row}-${col}`;
                if (lockedTiles.has(tileId)) continue;

                const tile = document.getElementById(`tile-${row}-${col}`);
                let color = null;
                if (tile.classList.contains('correct')) color = 'correct';
                else if (tile.classList.contains('present')) color = 'present';
                else if (tile.classList.contains('absent')) color = 'absent';

                if (color) {
                    prevStates.push({ tileId, color });
                }
            }
            if (prevStates.length) {
                undoStack.push({
                    type: 'clear-row',
                    row,
                    prevStates
                });
            }

            // 清除当前行的颜色
            for (let col = 0; col < wordLength; col++) {
                const tileId = `${row}-${col}`;
                if (lockedTiles.has(tileId)) continue;
                
                const tile = document.getElementById(`tile-${row}-${col}`);
                tile.classList.remove('correct', 'present', 'absent');
                manualColors.delete(tileId);
            }
            
            updateKeyboardFromManualColors();
            updateClearButton(row);
            saveGame();
        }

        function updateClearButton(row) {
            const clearBtn = document.querySelector(`.row:nth-child(${row + 1}) .clear-btn`);
            const hasManualColors = Array.from({length: wordLength}, (_, col) => 
                manualColors.has(`${row}-${col}`)
            ).some(Boolean);
            
            if (hasManualColors && gameBoard[row].join('') !== '') {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        }

        function updateKeyboardFromManualColors() {
            // Reset keyboard to default
            resetKeyboard();
            
            // Apply colors from manual markings only
            for (const [tileId, color] of manualColors.entries()) {
                const [row, col] = tileId.split('-').map(Number);
                const letter = gameBoard[row][col];
                if (letter) {
                    const key = document.querySelector(`[data-key="${letter}"]`);
                    if (key && !key.classList.contains('correct')) {
                        if (color === 'correct') {
                            key.className = 'key correct';
                        } else if (color === 'present' && !key.classList.contains('present')) {
                            key.className = 'key present';
                        } else if (color === 'absent' && !key.classList.contains('present')) {
                            key.className = 'key absent';
                        }
                    }
                }
            }
            saveGame();
        }

        function addLetter(letter) {
            if (gameOver) return;
            
            let targetCol = selectedCol >= 0 ? selectedCol : currentCol;
            if (targetCol >= wordLength) return;
            
            gameBoard[currentRow][targetCol] = letter;
            const tile = document.getElementById(`tile-${currentRow}-${targetCol}`);
            tile.textContent = letter;
            tile.classList.add('filled');
            
            if (selectedCol >= 0) {
                // Move to next empty position after selected tile
                tile.classList.remove('selected');
                selectedCol = -1;
                currentCol = Math.min(targetCol + 1, wordLength);
                
                // Find next empty position
                while (currentCol < wordLength && gameBoard[currentRow][currentCol] !== '') {
                    currentCol++;
                }
            } else {
                //currentCol = Math.min(currentCol + 1, wordLength);
                while (currentCol < wordLength && gameBoard[currentRow][currentCol] !== '') {
                    currentCol++;
                }
            }
            saveGame();
        }

        function removeLetter() {
            if (gameOver) return;
            
            let targetCol;
            if (selectedCol >= 0) {
                targetCol = selectedCol;
                document.getElementById(`tile-${currentRow}-${selectedCol}`).classList.remove('selected');
                currentCol = selectedCol;
                selectedCol = -1;
            } else {
                if (currentCol <= 0) return;
                currentCol--;
                targetCol = currentCol;
            }
            
            gameBoard[currentRow][targetCol] = '';
            const tile = document.getElementById(`tile-${currentRow}-${targetCol}`);
            tile.textContent = '';
            tile.className = 'tile';
            saveGame();
        }

        function submitGuess() {
            if (gameOver || gameBoard[currentRow].some(c => c === '')) {
                showMessage('Not enough letters', 'error');
                return;
            }
            
            const guess = gameBoard[currentRow].join('');
            
            // Check if word exists in word list
            if (!WORD_LIST.includes(guess) && !TARGET_WORDS.includes(guess)) {
                showMessage('Not in word list', 'error');
                return;
            }
            
            // Calculate correct and present counts
            const result = calculateScore(guess, targetWord);
            
            // Display the score
            displayScore(currentRow, result.correct, result.present);
            
            // Show clear button if row is complete
            updateClearButton(currentRow);


            
            
            // Check if won
            // if (guess === targetWord) {
            //     gameOver = true;
            //     showMessage(`Congratulations! You found the word: ${targetWord}`, 'success');
            //     return;
            // }
            if (guess === targetWord) {
                gameOver = true;
                recordResult(true);
                saveGame();

                // 动画标绿逐个字母
                for (let i = 0; i < wordLength; i++) {
                    setTimeout(() => {
                        const tile = document.getElementById(`tile-${currentRow}-${i}`);
                        tile.classList.add('correct');
                    }, i * 200); // 每个 tile 延迟 200ms
                }
                
                setTimeout(() => {
                    showMessage(`🎉 Congratulations! You found it: ${targetWord}`, 'success');
                    document.body.style.transition = 'background-color 0.5s';
                    document.body.style.backgroundColor = '#4CAF50';
                    setTimeout(() => document.body.style.backgroundColor = '', 700);
                }, 1000); // 在 tile 全部标绿后再弹出提示

                return;
            }
            
            currentRow++;
            currentCol = 0;
            selectedCol = -1;
            
            // if (currentRow >= maxGuesses) {
            //     gameOver = true;
            //     showMessage(`Game over! The word was: ${targetWord}`, 'error');
            // }
            if (currentRow >= maxGuesses) {
                gameOver = true;
                recordResult(false);
                saveGame();
                showMessage(`😢 Game Over! The word was: ${targetWord}`, 'error');
                document.body.style.transition = 'background-color 0.5s';
                document.body.style.backgroundColor = '#b00020';
                setTimeout(() => document.body.style.backgroundColor = '', 700);

                const solutionBox = document.getElementById('solution');
                solutionBox.textContent = `Correct word: ${targetWord}`;
            } else {
                saveGame();
            }
        }

        function calculateScore(guess, target) {
            let correct = 0;
            let present = 0;
            
            const targetLetters = target.split('');
            const guessLetters = guess.split('');
            const targetCounts = {};
            
            // Count letters in target
            for (let letter of targetLetters) {
                targetCounts[letter] = (targetCounts[letter] || 0) + 1;
            }
            
            // Count correct positions first
            for (let i = 0; i < wordLength; i++) {
                if (guessLetters[i] === targetLetters[i]) {
                    correct++;
                    targetCounts[guessLetters[i]]--;
                    guessLetters[i] = null; // Mark as used
                }
            }
            
            // Count present letters
            for (let i = 0; i < wordLength; i++) {
                if (guessLetters[i] !== null && targetCounts[guessLetters[i]] > 0) {
                    present++;
                    targetCounts[guessLetters[i]]--;
                }
            }
            
            return { correct, present };
        }

        function displayScore(row, correct, present) {
            const scoreDisplay = document.getElementById(`score-${row}`);
            const correctBox = scoreDisplay.querySelector('.score-correct');
            const presentBox = scoreDisplay.querySelector('.score-present');
            
            correctBox.textContent = correct;
            presentBox.textContent = present;
            
            scoreDisplay.classList.add('visible');
        }

        function resetColors() {
            if(gameOver) return;
            
            // 保存当前行的颜色状态以便撤销
            const prevStates = [];
            for (let row = 0; row <= currentRow && row < maxGuesses; row++) {
                for (let col = 0; col < wordLength; col++) {
                    const tileId = `${row}-${col}`;
                    if (lockedTiles.has(tileId)) continue;

                    const tile = document.getElementById(`tile-${row}-${col}`);
                    let color = null;
                    if (tile.classList.contains('correct')) color = 'correct';
                    else if (tile.classList.contains('present')) color = 'present';
                    else if (tile.classList.contains('absent')) color = 'absent';

                    if (color) {
                        prevStates.push({ tileId, color });
                    }
                }
            }
            if (prevStates.length) {
                undoStack.push({
                    type: 'reset-all',
                    prevStates
                });
            }
            
            for (let row = 0; row <= currentRow && row < maxGuesses; row++) {
                for (let col = 0; col < wordLength; col++) {
                    const tileId = `${row}-${col}`;
                    if (lockedTiles.has(tileId)) continue;
                    
                    const tile = document.getElementById(`tile-${row}-${col}`);
                    if (tile.textContent) {
                        tile.classList.remove('correct', 'present', 'absent');
                        manualColors.delete(tileId);
                    }
                }
                updateClearButton(row);
            }
            updateKeyboardFromManualColors();
            saveGame();
        }

        function undo() {
            if (undoStack.length === 0) return;

            const action = undoStack.pop();

            if (action.type === 'tile-color') {
                const tile = document.getElementById(`tile-${action.tileId}`);
                tile.classList.remove('correct', 'present', 'absent');
                if (action.prevColor) {
                    tile.classList.add(action.prevColor);
                    manualColors.set(action.tileId, action.prevColor);
                } else {
                    manualColors.delete(action.tileId);
                }
                updateKeyboardFromManualColors();
                updateClearButton(parseInt(action.tileId.split('-')[0]));
            }

            else if (action.type === 'clear-row' || action.type === 'reset-all') {
                for (const { tileId, color } of action.prevStates) {
                    const tile = document.getElementById(`tile-${tileId}`);
                    tile.classList.remove('correct', 'present', 'absent');
                    tile.classList.add(color);
                    manualColors.set(tileId, color);
                }
                updateKeyboardFromManualColors();
                if (action.type === 'clear-row') updateClearButton(action.row);
                else for (let row = 0; row <= currentRow && row < maxGuesses; row++) updateClearButton(row);
            }

            else if (action.type === 'lock-toggle') {
                const tile = document.getElementById(`tile-${action.tileId}`);
                const [row, col] = action.tileId.split('-').map(Number);

                if (action.prevLocked) {
                    // 原本是锁定的 → 恢复锁定
                    lockedTiles.add(action.tileId);
                    tile.classList.add('locked');
                } else {
                    // 原本是未锁定 → 移除锁定
                    lockedTiles.delete(action.tileId);
                    tile.classList.remove('locked');
                }
            }
            saveGame();
        }

        function resetKeyboard() {
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                if (!key.dataset.key.includes('Enter') && !key.dataset.key.includes('Backspace')) {
                    key.className = 'key';
                    if (key.dataset.key.length > 1) {
                        key.classList.add('wide');
                    }
                }
            });
        }

        function newGame() {
            localStorage.removeItem(SAVE_KEY);
            initGame(false);
            
        }

        function surrender() {
            if (gameOver) return;

            gameOver = true;
            selectedCol = -1;
            document.querySelector('.tile.selected')?.classList.remove('selected');
            recordResult(false, true);
            saveGame();

            document.getElementById('solution').textContent = `Correct word: ${targetWord}`;
            showMessage(`You surrendered. The word was: ${targetWord}`, 'error');
            document.body.style.transition = 'background-color 0.5s';
            document.body.style.backgroundColor = '#b00020';
            setTimeout(() => document.body.style.backgroundColor = '', 700);
        }

        // function showMessage(text, type = '') {
        //     const messageEl = document.getElementById('message');
        //     messageEl.textContent = text;
        //     messageEl.className = `message ${type}`;
            
        //     if (text && type === 'error') {
        //         setTimeout(() => {
        //             if (messageEl.textContent === text) {
        //                 messageEl.textContent = '';
        //                 messageEl.className = 'message';
        //             }
        //         }, 2000);
        //     }
        // }
        function showMessage(text, type = '') {
            // 移除旧的消息
            const oldMsg = document.querySelector('.floating-message');
            if (oldMsg) oldMsg.remove();

            // 创建新的浮动消息元素
            const msg = document.createElement('div');
            msg.className = `floating-message ${type}`;
            msg.textContent = text;

            document.body.appendChild(msg);

            // 自动移除
            setTimeout(() => {
                msg.remove();
            }, 2000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            localStorage.setItem(THEME_KEY, document.body.classList.contains('light') ? 'light' : 'dark');
        }

        document.body.classList.toggle('light', localStorage.getItem(THEME_KEY) !== 'dark');
        document.getElementById('statsClose').addEventListener('click', () => document.getElementById('statsDialog').close());
        document.getElementById('statsDialog').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) event.currentTarget.close();
        });
        document.querySelectorAll('[data-stats-tab]').forEach(button => {
            button.addEventListener('click', () => setStatsTab(button.dataset.statsTab));
        });
        document.getElementById('helpClose').addEventListener('click', () => document.getElementById('helpDialog').close());
        document.getElementById('helpDialog').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) event.currentTarget.close();
        });
        document.getElementById('clearDataButton').addEventListener('click', () => {
            if (!confirm('Clear the current game and all statistics?')) return;
            localStorage.removeItem(SAVE_KEY);
            localStorage.removeItem(STATS_KEY);
            document.getElementById('statsDialog').close();
            initGame(false);
            showMessage('Save and statistics cleared', 'success');
        });

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            
            const key = e.key.toUpperCase();
            
            if (key === 'ENTER') {
                submitGuess();
            } else if (key === 'BACKSPACE') {
                removeLetter();
            } else if (key >= 'A' && key <= 'Z' && key.length === 1) {
                addLetter(key);
            }
        });

        document.getElementById('keyboard').addEventListener('click', (e) => {
            const button = e.target.closest('.key');
            if (button) {
                const key = button.dataset.key;
                
                if (key === 'Enter') {
                    submitGuess();
                } else if (key === 'Backspace') {
                    removeLetter();
                } else {
                    addLetter(key);
                }
            }
        });

        // Initialize game
        loadDictionariesAndStart();
    </script>
</body>
